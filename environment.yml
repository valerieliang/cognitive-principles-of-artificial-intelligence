name: cog-ai

channels:
  - defaults
  - conda-forge

dependencies:
  # Python — kenlm has build issues on 3.12+ (especially 3.14); 3.10 is safe
  - python=3.10

  # Core scientific stack (conda-managed for speed/compatibility)
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - tqdm

  # Jupyter support in VSCode
  - ipykernel
  - ipywidgets
  - notebook

  # PyTorch — install CPU version by default; swap the pytorch-cuda line
  # below if you have a CUDA GPU
  - pytorch::pytorch          # CPU
  # - pytorch::pytorch-cuda=11.8  # GPU (uncomment + remove line above)

  - pip

  - pip:
      # kenlm — must be built from source; requires cmake + a C++ compiler.
      # On macOS:  brew install cmake
      # On Linux:  sudo apt install cmake build-essential
      - https://github.com/kpu/kenlm/archive/master.zip

      # SentencePiece tokenizer used by the KenLM wrapper
      - sentencepiece

      # HuggingFace stack (pinned to match the notebook)
      - transformers==4.31.0
      - datasets
      - accelerate==0.21.0
      - peft==0.4.0

      # bitsandbytes is Linux/CUDA-only; comment out on macOS or CPU-only
      - bitsandbytes==0.40.2
